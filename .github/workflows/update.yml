name: Update Dashboard Data

on:
  schedule:
    # Setiap hari pukul 01:00 WITA (17:00 UTC hari sebelumnya)
    - cron: "0 17 * * *"
  workflow_dispatch: {}   # bisa dijalankan manual dari tab Actions
  push:
    branches: [main]
    paths:
      - "scripts/scrape.py"   # hanya trigger saat script-nya sendiri diedit
      # (sengaja TIDAK menyertakan docs/** agar tidak memicu diri sendiri
      #  setiap kali bot commit data.json)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape-and-update"   # cegah 2 run scraping jalan bersamaan
  cancel-in-progress: false

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Jalankan scraping
        run: python scripts/scrape.py

      - name: Commit & push data terbaru
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet && { echo "Tidak ada perubahan data, lewati commit."; exit 0; }
          git commit -m "chore: update data review otomatis ($(date '+%Y-%m-%d %H:%M'))"

          # Coba push, jika ditolak karena remote berubah duluan, pull --rebase lalu coba lagi
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push berhasil."
              break
            fi
            echo "Push ditolak, mencoba pull --rebase (percobaan $i)..."
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 2))
          done

  deploy-pages:
    needs: scrape-and-update
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"

      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
